<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" fill="none">
  <defs>
    <!-- G letter gradient: dark navy-teal to mid teal -->
    <linearGradient id="gGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0b4f6c"/>
      <stop offset="100%" stop-color="#0a7a9a"/>
    </linearGradient>
    <!-- S letter gradient: mid teal to bright cyan -->
    <linearGradient id="sGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a8fb5"/>
      <stop offset="100%" stop-color="#00d4d4"/>
    </linearGradient>
    <!-- Orbital ring gradient -->
    <linearGradient id="orbGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b4f6c"/>
      <stop offset="40%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#00d4d4"/>
    </linearGradient>
    <!-- DNA gradient -->
    <linearGradient id="dnaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.95"/>
    </linearGradient>
    <!-- S combined gradient (used for the S fill) -->
    <linearGradient id="sFill" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#0a8fb5"/>
      <stop offset="50%" stop-color="#06b6c8"/>
      <stop offset="100%" stop-color="#00d4d4"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════
       G LETTER — bold rounded sans-serif shape
       Outer arc + inner cutout + horizontal bar
       ═══════════════════════════════════════ -->
  <path d="
    M 195,50
    C 155,50 118,65 92,91
    C 65,118 50,154 50,194
    C 50,234 65,270 92,296
    C 118,322 155,337 195,337
    C 232,337 265,325 288,304
    C 295,297 300,288 300,278
    L 300,210
    C 300,202 294,196 286,196
    L 218,196
    C 210,196 204,202 204,210
    C 204,218 210,224 218,224
    L 272,224
    L 272,272
    C 254,288 226,309 195,309
    C 163,309 135,297 114,276
    C 94,255 82,226 82,194
    C 82,162 94,133 114,112
    C 135,91 163,79 195,79
    C 224,79 249,90 268,109
    C 274,115 283,115 289,109
    C 295,103 295,94 289,88
    C 264,63 231,50 195,50 Z
  " fill="url(#gGrad)"/>

  <!-- ═══════════════════════════════════════
       S LETTER — bold rounded sans-serif shape
       ═══════════════════════════════════════ -->
  <path d="
    M 370,50
    C 340,50 314,59 295,74
    C 276,90 265,112 265,138
    C 265,162 274,184 290,200
    C 306,216 328,225 352,232
    L 376,239
    C 396,245 410,252 420,261
    C 430,270 435,282 435,296
    C 435,311 428,324 416,333
    C 404,342 388,347 370,347
    C 350,347 332,340 319,328
    C 313,322 304,322 298,328
    C 292,334 292,343 298,349
    C 315,365 341,375 370,375
    C 398,375 422,366 440,350
    C 458,334 468,311 468,287
    C 468,262 458,240 440,224
    C 422,208 398,198 370,190
    L 346,183
    C 328,177 316,170 308,162
    C 300,154 296,143 296,130
    C 296,116 303,103 315,94
    C 327,85 343,79 362,79
    C 381,79 397,85 408,95
    C 414,101 423,101 429,95
    C 435,89 435,80 429,74
    C 413,59 393,50 370,50 Z
  " fill="url(#sFill)"/>

  <!-- ═══════════════════════════════════════
       ORBITAL RING — tilted ellipse around both letters
       ═══════════════════════════════════════ -->
  <ellipse cx="258" cy="195" rx="232" ry="72"
           stroke="url(#orbGrad)" stroke-width="8" fill="none"
           transform="rotate(-14 258 195)"/>

  <!-- Small spacecraft / capsule at top-right of orbit -->
  <g transform="translate(452,90) rotate(-28)">
    <ellipse cx="0" cy="0" rx="14" ry="6.5" fill="#0b4f6c"/>
    <path d="M10,-4 L18,0 L10,4 Z" fill="#0891b2"/>
    <circle cx="1" cy="-1" r="3.5" fill="#22d3ee" opacity="0.9"/>
  </g>

  <!-- ═══════════════════════════════════════
       DNA HELIX inside G opening (approx x=110-160, y=105-295)
       ═══════════════════════════════════════ -->
  <!-- Left strand -->
  <path d="M 118,112 C 106,136 155,158 144,182 C 133,206 106,228 118,252 C 130,274 155,280 144,290"
        stroke="url(#dnaGrad)" stroke-width="3.8" fill="none" stroke-linecap="round"/>
  <!-- Right strand -->
  <path d="M 153,112 C 165,136 116,158 127,182 C 138,206 165,228 153,252 C 141,274 116,280 127,290"
        stroke="url(#dnaGrad)" stroke-width="3.8" fill="none" stroke-linecap="round"/>
  <!-- Crossbars -->
  <line x1="118" y1="112" x2="153" y2="112" stroke="#22d3ee" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="129" y1="147" x2="142" y2="147" stroke="#22d3ee" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="118" y1="182" x2="153" y2="182" stroke="#22d3ee" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="118" y1="217" x2="153" y2="217" stroke="#22d3ee" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="129" y1="252" x2="142" y2="252" stroke="#22d3ee" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="118" y1="278" x2="153" y2="278" stroke="#22d3ee" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>

  <!-- ═══════════════════════════════════════
       CRESCENT MOON inside upper S curve
       ═══════════════════════════════════════ -->
  <circle cx="348" cy="140" r="24" fill="#0a4a62" opacity="0.95"/>
  <circle cx="357" cy="136" r="18" fill="#0891b2"/>

  <!-- ═══════════════════════════════════════
       LEAF / SEEDLING at bottom of S
       ═══════════════════════════════════════ -->
  <!-- Left leaf -->
  <path d="M 348,285 Q 326,262 334,242 Q 352,256 348,285 Z" fill="#00d4d4" opacity="0.95"/>
  <!-- Right leaf -->
  <path d="M 348,285 Q 370,262 362,242 Q 344,256 348,285 Z" fill="#00c4c0" opacity="0.85"/>
  <!-- Stem -->
  <line x1="348" y1="310" x2="348" y2="275" stroke="#0a7a9a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small dot accent near S -->
  <circle cx="460" cy="110" r="5.5" fill="#0b4f6c"/>
  <circle cx="300" cy="282" r="5" fill="#00d4d4" opacity="0.8"/>
</svg>
